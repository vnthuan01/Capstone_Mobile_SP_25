<!DOCTYPE html>

<html class="light" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đổi mật khẩu</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#DA251D",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div
        class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
        <!-- Header / Navigation -->
        <div
            class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
            <div
                class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-start cursor-pointer">
                <span class="material-symbols-outlined">arrow_back</span>
            </div>
            <h2
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">
                Đổi mật khẩu</h2>
        </div>
        <!-- Content Area -->
        <main class="flex-1 max-w-[480px] mx-auto w-full px-4 pt-8 pb-24">
            <div class="mb-8">
                <h3 class="text-slate-900 dark:text-slate-100 tracking-light text-2xl font-bold leading-tight pb-2">Cập
                    nhật mật khẩu</h3>
                <p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Vui lòng nhập mật
                    khẩu hiện tại và mật khẩu mới bên dưới để bảo vệ tài khoản của bạn.</p>
            </div>
            <!-- Form Groups -->
            <div class="space-y-6">
                <!-- Current Password -->
                <div class="flex flex-col gap-2">
                    <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Mật khẩu hiện
                        tại</label>
                    <div class="relative flex w-full items-stretch">
                        <input
                            class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] pr-12 text-base font-normal leading-normal transition-colors"
                            placeholder="Nhập mật khẩu hiện tại" type="password" />
                        <button
                            class="absolute right-0 top-0 h-full px-4 text-slate-400 hover:text-primary flex items-center justify-center transition-colors">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Divider with light primary tint -->
                <div class="h-px bg-slate-200 dark:bg-slate-800 w-full"></div>
                <!-- New Password -->
                <div class="flex flex-col gap-2">
                    <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Mật khẩu
                        mới</label>
                    <div class="relative flex w-full items-stretch">
                        <input
                            class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] pr-12 text-base font-normal leading-normal transition-colors"
                            placeholder="Nhập mật khẩu mới" type="password" />
                        <button
                            class="absolute right-0 top-0 h-full px-4 text-slate-400 hover:text-primary flex items-center justify-center transition-colors">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                    <p class="text-slate-500 text-xs mt-1">Sử dụng ít nhất 8 ký tự bao gồm chữ và số.</p>
                </div>
                <!-- Confirm New Password -->
                <div class="flex flex-col gap-2">
                    <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Xác nhận mật
                        khẩu mới</label>
                    <div class="relative flex w-full items-stretch">
                        <input
                            class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] pr-12 text-base font-normal leading-normal transition-colors"
                            placeholder="Nhập lại mật khẩu mới" type="password" />
                        <button
                            class="absolute right-0 top-0 h-full px-4 text-slate-400 hover:text-primary flex items-center justify-center transition-colors">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Action Button -->
            <div class="mt-10">
                <button
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                    Cập nhật
                </button>
                <button
                    class="w-full mt-4 bg-transparent text-slate-500 dark:text-slate-400 font-medium py-2 hover:text-primary transition-colors">
                    Hủy bỏ
                </button>
            </div>
        </main>
        <!-- Bottom Navigation -->
        <div
            class="fixed bottom-0 left-0 right-0 z-20 flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-2">
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">home</span>
                <p class="text-xs font-medium leading-normal">Trang chủ</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">notifications</span>
                <p class="text-xs font-medium leading-normal">Thông báo</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">person</span>
                <p class="text-xs font-medium leading-normal">Cá nhân</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
                <p class="text-xs font-medium leading-normal">Cài đặt</p>
            </a>
        </div>
    </div>
</body>

</html>
